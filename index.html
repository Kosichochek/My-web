<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic App | Neobrutalism</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --border-width: 3px;
            --shadow: 6px 6px 0px #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--fg); padding: 20px; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border: var(--border-width) solid var(--fg);
            box-shadow: var(--shadow); margin-bottom: 40px; background: #fff;
        }
        .logo { font-weight: 900; font-size: 1.5rem; text-transform: uppercase; cursor: pointer; }
        
        button, input {
            padding: 12px 20px; border: var(--border-width) solid var(--fg);
            background: #fff; font-weight: 700; cursor: pointer;
            box-shadow: 3px 3px 0px #000; transition: 0.1s;
        }
        button:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px #000; }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #000; }
        
        .search-container { display: flex; gap: 30px; align-items: flex-start; margin-top: 20px; }
        .spec-column { width: 250px; display: flex; flex-direction: column; gap: 10px; }
        .docs-column { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        .card { border: var(--border-width) solid var(--fg); padding: 20px; box-shadow: var(--shadow); background: #fff; }
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); z-index: 100; justify-content: center; align-items: center; 
        }
        .notification { 
            display: none; position: fixed; top: 20px; right: 20px; padding: 20px; 
            border: var(--border-width) solid var(--fg); background: #fff; font-weight: 900; z-index: 1000; 
        }
        .active-spec { background: #000 !important; color: #fff !important; }

        section { display: none; }
        #home { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: var(--border-width) solid var(--fg); padding: 15px; text-align: center; }
        th { background: #eee; }
    </style>
</head>
<body>
    <div id="notify" class="notification">УСПЕШНО!</div>

    <header>
        <div class="logo" onclick="showSection('home')">CLINIC APP</div>
        <nav style="display: flex; gap: 20px;">
            <button onclick="showSection('search')" data-i18n="nav-find">Найти врача</button>
            <button onclick="showSection('dashboard')" data-i18n="nav-appointments">Мои записи</button>
            <button onclick="showSection('doctorportal')" data-i18n="nav-portal">Портал врача</button>
        </nav>
        <div class="lang-sw" style="display: flex; gap: 10px;">
            <button onclick="changeLanguage('ru')">RU</button>
            <button onclick="changeLanguage('en')">EN</button>
            <button id="auth-btn" onclick="showAuthModal()">ВОЙТИ</button>
        </div>
    </header>

    <main>
        <section id="home" style="text-align: center;">
            <h1 style="font-size: 3.5rem; margin-bottom: 20px;" data-i18n="home-title">ПРОСТАЯ ПОМОЩЬ</h1>
            <button onclick="showSection('search')" style="font-size: 1.5rem; padding: 20px 40px;" data-i18n="search-btn">Начать поиск</button>
        </section>

        <section id="search">
            <div class="search-container">
                <div class="spec-column" id="spec-list"></div>
                <div class="docs-column" id="docs-list">
                    <p style="font-weight: 700;" data-i18n="select-spec-text">Выберите специализацию слева...</p>
                </div>
            </div>
        </section>

        <section id="booking">
            <div class="card">
                <h2 id="book-doc-name">ИМЯ ВРАЧА</h2>
                <input type="date" id="book-date" onchange="renderSlots()" style="margin: 20px 0;">
                <div id="slots-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;"></div>
            </div>
        </section>

        <section id="dashboard">
            <h2 style="margin-bottom: 20px;" data-i18n="nav-appointments">Мои записи</h2>
            <div id="dash-content"></div>
        </section>

        <section id="doctorportal">
            <div class="card">
                <h2 data-i18n="nav-portal">Портал врача</h2>
                <table>
                    <thead>
                        <tr>
                            <th data-i18n="col-time">ВРЕМЯ</th>
                            <th data-i18n="col-patient">ПАЦИЕНТ</th>
                            <th data-i18n="col-actions">ДЕЙСТВИЯ</th>
                        </tr>
                    </thead>
                    <tbody id="portal-tbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer style="margin-top: 60px; padding: 20px; border-top: 3px solid #000; text-align: center;">
        <p>г. Петропавловск, ул. Пушкина, 86 (NKU)</p>
    </footer>

    <div id="auth-modal" class="modal">
        <div class="card" style="width: 350px;">
            <h2 style="text-align: center; margin-bottom: 20px;" data-i18n="auth-title">ВХОД</h2>
            <input type="text" id="auth-name" placeholder="ФИО" style="width: 100%; margin-bottom: 15px;">
            <input type="email" id="auth-email" placeholder="Email" style="width: 100%; margin-bottom: 15px;">
            <input type="password" id="auth-pass" placeholder="Пароль" style="width: 100%; margin-bottom: 15px;">
            <button onclick="login()" style="width: 100%; background: #000; color: #fff;" data-i18n="btn-login">ПРОДОЛЖИТЬ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
